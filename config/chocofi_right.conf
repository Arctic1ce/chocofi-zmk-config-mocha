# Peripheral (right) half: do not duplicate central-only widget options (see chocofi_left.conf).

# BLE split: this half does not present USB HID by default — key events go to the central over Bluetooth.
# Plug the USB cable in only for power or flashing; type with both halves powered and the left connected to the host.
# Optional debug: uncomment to type from the right half alone over USB (not required for normal use).
# CONFIG_ZMK_USB=y
